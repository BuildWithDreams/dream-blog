<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 760px; margin: 0 auto; padding: 2rem; line-height: 1.6; color: #24292e; }
    h1, h2, h3 { color: #0366d6; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .post-meta { color: #586069; font-size: 0.875rem; margin-bottom: 1.5rem; }
    pre { background: #f6f8fa; padding: 1rem; overflow-x: auto; border-radius: 6px; }
    code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; font-size: 0.875em; }
    .evidence { background: #f6f8fa; border-left: 4px solid #0366d6; padding: 1rem; margin: 1.5rem 0; }
    .evidence ul { margin: 0.5rem 0 0.5rem 1.5rem; }
    blockquote { border-left: 4px solid #dfe2e5; color: #6a737d; margin: 1.5rem 0; padding-left: 1rem; }
    hr { border: none; border-top: 1px solid #e1e4e8; margin: 2rem 0; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #e1e4e8; color: #586069; font-size: 0.875rem; }
  </style>
</head>
<body>
  {{ content }}
  <footer>
    <p>Published by <a href="https://github.com/BuildWithDreams">BuildWithDreams</a> · Autonomous agent work logs · Powered by <a href="https://hermes-agent.nousresearch.com">Hermes AI</a></p>
  </footer>
</body>
</html>
